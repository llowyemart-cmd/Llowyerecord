<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>вЩЂвЛЖ вЩ™ вВКЋЪвЩђпЊЯHealing BarengЋЪвЩ™ рЭДЮвВК вЩЂ ЋЪвКє</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:#0f1115;
    font-family:'Segoe UI', system-ui, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
  }
  h1{
    color:#f5f5f7;
    font-size:1.3rem;
    margin-bottom:28px;
    text-align:center;
  }

  .player-card{
    position:relative;
    width:280px;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 25px 50px rgba(0,0,0,0.5);
  }
  .bg-blur{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    filter:blur(35px) brightness(0.4) saturate(0.4) grayscale(0.3);
    transform:scale(1.3);
  }
  .overlay-dark{
    position:absolute;
    inset:0;
    background:rgba(20,20,22,0.55);
  }
  .content{
    position:relative;
    z-index:2;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .art{
    width:100%;
    aspect-ratio:1/1;
    border-radius:12px;
    object-fit:cover;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
  }
  .track-info{
    width:100%;
    margin-top:16px;
  }
  .title{
    color:#fff;
    font-weight:700;
    font-size:1.05rem;
  }
  .artist{
    color:rgba(255,255,255,0.75);
    font-size:0.9rem;
    margin-top:2px;
  }
  .progress-row{
    width:100%;
    margin-top:16px;
  }
  input[type="range"]{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    height:4px;
    border-radius:2px;
    background:rgba(255,255,255,0.3);
    outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:12px;
    height:12px;
    border-radius:50%;
    background:#fff;
    cursor:pointer;
  }
  #seek{
    background:linear-gradient(to right, #fff 0%, #fff 0%, rgba(255,255,255,0.3) 0%);
  }
  .time-row{
    display:flex;
    justify-content:space-between;
    width:100%;
    margin-top:6px;
    color:rgba(255,255,255,0.65);
    font-size:0.72rem;
  }
  .controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:36px;
    margin-top:18px;
  }
  .ctrl-btn{
    background:none;
    border:none;
    color:#fff;
    cursor:pointer;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .ctrl-btn svg{ width:22px; height:22px; fill:#fff; }
  #playBtn svg{ width:32px; height:32px; }

  .volume-row{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    margin-top:20px;
  }
  .volume-row span{ color:rgba(255,255,255,0.6); font-size:0.85rem; }
  #volume{ flex:1; height:3px; }

  .airplay-row{
    margin-top:16px;
    display:flex;
    align-items:center;
    gap:6px;
    color:rgba(255,255,255,0.55);
    font-size:0.72rem;
  }

  #ytHost{
    position:fixed;
    width:1px;
    height:1px;
    opacity:0;
    pointer-events:none;
    bottom:0; left:0;
  }
</style>
</head>
<body>

  <h1>вЩЂвЛЖ вЩ™ вВКЋЪвЩђпЊЯHealing BarengЋЪвЩ™ рЭДЮвВК вЩЂ ЋЪвКє</h1>

  <div class="player-card">
    <div class="bg-blur" style="background-image:url('teh.jpeg')"></div>
    <div class="overlay-dark"></div>
    <div class="content">
      <img class="art" src="teh.jpeg" alt="Teh Hijau - Tulus">

      <div class="track-info">
        <div class="title">Teh Hijau</div>
        <div class="artist">Tulus</div>
      </div>

      <div class="progress-row">
        <input type="range" id="seek" min="0" max="100" value="0">
      </div>
      <div class="time-row">
        <span id="curTime">0:00</span>
        <span id="totalTime">-0:00</span>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="prevBtn" title="Ulang dari awal">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn" id="playBtn" title="Play/Pause">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" title="Lagu berikutnya" disabled style="opacity:0.35;">
          <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
        </button>
      </div>

      <div class="volume-row">
        <span>рЯФИ</span>
        <input type="range" id="volume" min="0" max="100" value="70">
        <span>рЯФК</span>
      </div>

    </div>
  </div>

  <div id="ytHost"><div id="ytPlayer"></div></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // Ganti VIDEO_ID ini kalau mau ganti lagu / nambah lagu lain
  const VIDEO_ID = "zyLmavBAY7k"; // TULUS - Teh Hijau (Official Music Video)

  let player;
  let isReady = false;
  let isSeeking = false;

  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const prevBtn = document.getElementById('prevBtn');
  const seek = document.getElementById('seek');
  const volume = document.getElementById('volume');
  const curTimeEl = document.getElementById('curTime');
  const totalTimeEl = document.getElementById('totalTime');

  const ICON_PLAY = '<path d="M8 5v14l11-7z"/>';
  const ICON_PAUSE = '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';

  function formatTime(sec){
    if (isNaN(sec) || sec < 0) sec = 0;
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2,'0')}`;
  }

  function onYouTubeIframeAPIReady(){
    player = new YT.Player('ytPlayer', {
      height: '1',
      width: '1',
      videoId: VIDEO_ID,
      playerVars: {
        controls: 0,
        disablekb: 1,
        modestbranding: 1,
        rel: 0
      },
      events: {
        onReady: onPlayerReady,
        onStateChange: onPlayerStateChange
      }
    });
  }
  window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

  function onPlayerReady(){
    isReady = true;
    player.setVolume(70);
    const dur = player.getDuration();
    totalTimeEl.textContent = '-' + formatTime(dur);
    updateLoop();
  }

  function onPlayerStateChange(e){
    if (e.data === YT.PlayerState.PLAYING){
      playIcon.innerHTML = ICON_PAUSE;
    } else {
      playIcon.innerHTML = ICON_PLAY;
    }
    if (e.data === YT.PlayerState.CUED || e.data === YT.PlayerState.UNSTARTED){
      const dur = player.getDuration();
      if (dur) totalTimeEl.textContent = '-' + formatTime(dur);
    }
  }

  playBtn.addEventListener('click', () => {
    if (!isReady) return;
    const state = player.getPlayerState();
    if (state === YT.PlayerState.PLAYING){
      player.pauseVideo();
    } else {
      player.playVideo();
    }
  });

  prevBtn.addEventListener('click', () => {
    if (!isReady) return;
    player.seekTo(0, true);
  });

  seek.addEventListener('input', () => {
    isSeeking = true;
    seek.style.background = `linear-gradient(to right, #fff ${seek.value}%, rgba(255,255,255,0.3) ${seek.value}%)`;
  });
  seek.addEventListener('change', () => {
    if (!isReady) { isSeeking = false; return; }
    const dur = player.getDuration();
    const target = (seek.value / 100) * dur;
    player.seekTo(target, true);
    isSeeking = false;
  });

  volume.addEventListener('input', () => {
    if (!isReady) return;
    player.setVolume(volume.value);
  });

  function updateLoop(){
    if (isReady && !isSeeking){
      const cur = player.getCurrentTime() || 0;
      const dur = player.getDuration() || 0;
      const pct = dur ? (cur / dur) * 100 : 0;
      seek.value = pct;
      seek.style.background = `linear-gradient(to right, #fff ${pct}%, rgba(255,255,255,0.3) ${pct}%)`;
      curTimeEl.textContent = formatTime(cur);
      totalTimeEl.textContent = '-' + formatTime(Math.max(dur - cur, 0));
    }
    requestAnimationFrame(updateLoop);
  }
</script>

</body>
</html>
